<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Holi 💖</title>
<style>
body{
margin:0;
text-align:center;
font-family:Poppins;
background:#ff6f91;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
padding:20px;
}
.card{
background:rgba(255,255,255,0.2);
padding:25px;
border-radius:20px;
max-width:500px;
}
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:white;
color:#ff4081;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h2>💖 Tumhare Liye</h2>
<p id="msg">
Kabhi kabhi sochta hoon…  
Meri life mein agar koi sabse bright rang hai, toh wo tum ho 🌈  
Thanks for being my happiness ✨
</p>
<button onclick="changeMsg()">Aur Pyaari Baat 💌</button>
</div>

<script>
const lines=[
"Tumhari smile meri Holi ka sabse khoobsurat rang hai 😊💖",
"Dosti ho ya bestie wala pyaar… tum hamesha special rahoge 🌸",
"Har saal Holi aaye… par tum jaisa insaan baar baar nahi milta ✨"
];
function changeMsg(){
document.getElementById("msg").innerHTML=lines[Math.floor(Math.random()*lines.length)];
}
</script>

</body>
</html>
